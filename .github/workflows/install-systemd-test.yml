name: install-systemd-test

on:
  push:
    branches: [main]
    paths:
      - scripts/install-systemd.sh
      - scripts/install-systemd-test.sh
      - packaging/systemd/**
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - src/bin/placebo_agent/**
      - src/cli/serve.rs
      - src/cli/init.rs
      - src/cli/init/**
      - src/config.rs
      - src/dev_gates.rs
      - src/main.rs
      - src/runtime/install/**
      - .github/workflows/install-systemd-test.yml
  pull_request:
    paths:
      - scripts/install-systemd.sh
      - scripts/install-systemd-test.sh
      - packaging/systemd/**
      - Dockerfile
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - src/bin/placebo_agent/**
      - src/cli/serve.rs
      - src/cli/init.rs
      - src/cli/init/**
      - src/config.rs
      - src/dev_gates.rs
      - src/main.rs
      - src/runtime/install/**
      - .github/workflows/install-systemd-test.yml

concurrency:
  group: install-systemd-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --features test-fixtures --bin acps --bin acpctl --bin placebo-agent --locked

      - name: Run install-systemd-test.sh
        env:
          ACP_STACK_SKIP_BUILD: '1'
          ACP_STACK_SYSTEMD_TEST_AGENT: placebo
          ACP_STACK_DEV_PLACEBO_REGISTRY: /src/target/release/placebo-agent
        run: bash scripts/install-systemd-test.sh

      - name: Capture journal on failure
        if: failure()
        run: |
          container="$(docker ps --filter name=acp-stack-systemd-test- --format '{{.Names}}' | head -n1)"
          if [[ -n "${container}" ]]; then
            mkdir -p test-logs
            docker exec "${container}" systemctl status acp-stack.service --no-pager >test-logs/status.txt 2>&1 || true
            docker exec "${container}" journalctl -u acp-stack.service --no-pager >test-logs/journal.txt 2>&1 || true
          fi

      - name: Upload diagnostic logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-systemd-test-logs
          path: test-logs
          if-no-files-found: ignore
