name: release-gate-tests

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - Dockerfile
      - scripts/docker-entrypoint.sh
      - src/**
      - tests/release_gate_tests.rs
      - tests/release_acceptance_tests.rs
      - .github/workflows/release-gate-tests.yml
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - Dockerfile
      - scripts/docker-entrypoint.sh
      - src/**
      - tests/release_gate_tests.rs
      - tests/release_acceptance_tests.rs
      - .github/workflows/release-gate-tests.yml

concurrency:
  group: release-gate-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run release gate tests
        run: cargo test --test release_gate_tests --locked

      - name: Run release acceptance tests
        run: cargo test --test release_acceptance_tests --features dev-tools,test-fixtures --locked
