name: release-gate-tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: release-gate-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run dev build compile gate
        run: cargo check --no-default-features --bin acps --locked

      - name: Run full test suite
        run: cargo test --all-targets --all-features --locked

      - name: Run release gate tests
        run: cargo test --test release_gate_tests --locked

      - name: Run release acceptance tests
        run: cargo test --test release_acceptance_tests --features dev-tools,test-fixtures --locked

      - name: Check skills catalog sync
        run: cargo run --features dev-tools --bin sync-skills-catalog -- --check
