# Supported Agents

# OpenCode

[[agents]]
id = "opencode"
name = "OpenCode"
kind = "native"
headless_compatible = true
set_provider = true
set_model = true
allow_custom_provider = true
allow_custom_model = true
set_mode = true # build, plan
supports_mcp = true
supports_agent_skills = true
agent_skills_install_dir = "~/.agents/skills"
subagents = true
subagent_alias = "small_model"
stdio_framing = "json-lines"
website = "https://opencode.ai"
github = "anomalyco/opencode"
support_doc = "docs/agents/opencode.md"
testflight_prompt = "Create a file named .acp-stack-testflight.txt in the current workspace containing exactly: acp-stack testflight ok"
testflight_expect_fs = ".acp-stack-testflight.txt"

[agents.harness]
id = "opencode"

[agents.harness.install.shell]
script = '''
set -eu
managed_bin="${HOME}/.local/bin"
managed_opencode="${managed_bin}/opencode"
mkdir -p "$managed_bin"
curl -fsSL https://opencode.ai/install | XDG_BIN_DIR="$managed_bin" bash -s -- --no-modify-path
test -x "$managed_opencode"
'''
creates = "opencode"
required_tools = ["curl", "bash"]

[agents.harness.install.npm]
package = "opencode-ai"
creates = "opencode"

[agents.harness.install.github]
asset_pattern = "opencode-linux-{arch}.tar.gz"
archive = "tar.gz"
binary_name = "opencode"

[agents.harness.install.github.arch]
x86_64 = "x64"
aarch64 = "arm64"

# Free auxiliary/subagent models exposed via `acps subagent free`.
#
# Resolution:
#   - If a main provider is configured, the first entry whose provider is in
#     the same family as the main provider wins. Family membership is matched
#     by provider id, or by shared canonical env ref (so `opencode-go` aliases
#     to `opencode` because both canonicalize to OPENCODE_API_KEY).
#   - If no main provider is configured, the first entry whose canonical env
#     ref is present in `[agent].env` wins. List order is the tiebreaker.
[[agents.subagent_free_models]]
provider = "openrouter"
model = "openrouter/free"

[[agents.subagent_free_models]]
provider = "opencode"
model = "opencode/big-pickle"

