# Supported Agents

# OpenCode

[[agents]]
id = "opencode"
name = "OpenCode"
kind = "native"
headless_compatible = true
set_provider = true
set_model = true
set_mode = true # build, plan
stdio_framing = "json-lines"
website = "https://opencode.ai"
github = "anomalyco/opencode"
support_doc = "docs/agents/opencode.md"

[agents.harness]
id = "opencode"

[agents.harness.install.shell]
script = '''
set -eu
managed_bin="${HOME}/.local/bin"
managed_opencode="${managed_bin}/opencode"
mkdir -p "$managed_bin"
curl -fsSL https://opencode.ai/install | XDG_BIN_DIR="$managed_bin" bash -s -- --no-modify-path
test -x "$managed_opencode"
'''
creates = "opencode"

[agents.harness.install.npm]
package = "opencode-ai"
creates = "opencode"

[agents.harness.install.github]
asset_pattern = "opencode-linux-{arch}.tar.gz"
archive = "tar.gz"
binary_name = "opencode"

[agents.harness.install.github.arch]
x86_64 = "x64"
aarch64 = "arm64"

# Cursor CLI

[[agents]]
id = "cursor"
name = "Cursor CLI"
kind = "native"
headless_compatible = true
set_provider = false
set_model = true
set_mode = true # agent, plan, ask
stdio_framing = "json-lines"
website = "https://cursor.com/cli"
support_doc = "docs/agents/cursor.md"

[agents.harness]
id = "cursor-agent"

[agents.harness.install.shell]
script = '''
set -eu
managed_bin="${HOME}/.local/bin"
managed_cursor="${managed_bin}/cursor-agent"
mkdir -p "$managed_bin"
curl -fsS https://cursor.com/install | bash
test -x "$managed_cursor"
'''
creates = "cursor-agent"

