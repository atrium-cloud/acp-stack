[package]
name = "acp-stack"
version = "0.0.1"
edition = "2024"
description = "Self-hostable Linux runtime for ACP-compatible agents."
license = "Apache-2.0"
readme = "README.md"
rust-version = "1.85"

[lib]
path = "src/lib.rs"

[[bin]]
name = "acps"
path = "src/main.rs"

[dependencies]
base64 = "0.22.1"
clap = { version = "4.6.1", features = ["derive"] }
rusqlite = { version = "0.39.0", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
chrono = { version = "0.4.44", default-features = false, features = ["clock"] }
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
age = "0.11.3"
rand = "0.10.1"
subtle = "2.6.1"
tempfile = "3.27.0"

[dev-dependencies]
assert_cmd = "2.2.2"
predicates = "3.1.4"
