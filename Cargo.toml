[package]
name = "acp-stack"
version = "0.0.1"
edition = "2024"
description = "Self-hostable Linux runtime for ACP-compatible agents."
license = "Apache-2.0"
readme = "README.md"
rust-version = "1.85"

[lib]
path = "src/lib.rs"

[[bin]]
name = "acps"
path = "src/main.rs"

[dependencies]
base64 = "0.22.1"
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
toml = "1.1.2"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

[dev-dependencies]
assert_cmd = "2.2.2"
predicates = "3.1.4"
tempfile = "3.27.0"
